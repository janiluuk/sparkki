# Verso stack
#
# Postgres + Prisma migrations (default — no app image):
#   docker compose up -d
#   Use DATABASE_URL pointing at localhost:5432 for host-run Next.js / Prisma
#   (see .env.example).
#
# App + database + migrations (production-like):
#   docker compose --profile app up -d --build
#
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-verso}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - verso_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-verso}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Applies prisma/migrations whenever the stack comes up (idempotent).
  migrate:
    image: node:20-bookworm-slim
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-verso}
    volumes:
      - ./prisma:/app/prisma:ro
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -e
        npx --yes prisma@5.22.0 migrate deploy --schema=./prisma/schema.prisma

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-verso}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production-min-32-chars}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@verso.fi}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  verso_pgdata:
