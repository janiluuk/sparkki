# Reverse proxy for noVNC + websockify (Mint / Fedora demos).
# Defaults target lab host 192.168.2.100 — change upstream lines if needed.
# Optional access gate: TRY_LINUX_ACCESS_TOKEN + query ?access_token=...

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream mint_ws {
    server 192.168.2.100:6080;
}

upstream fedora_ws {
    server 192.168.2.100:6081;
}

server {
    listen 80;
    server_name _;

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }

    location /try/mint/ {
        limit_req zone=trylinux_req burst=40 nodelay;
        if ($try_linux_gate = 0) {
            return 403;
        }
        proxy_pass http://mint_ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /try/fedora/ {
        limit_req zone=trylinux_req burst=40 nodelay;
        if ($try_linux_gate = 0) {
            return 403;
        }
        proxy_pass http://fedora_ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
